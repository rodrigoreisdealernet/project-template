name: Bug Report
description: Report a defect or incorrect behaviour
title: "fix(scope): "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Follow the [canonical issue format](../../doc_templates/ISSUE.md) — it explains what each section requires.
        **Title:** replace `scope` with the affected module/area and complete the imperative phrase.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: >
        One prose paragraph: what is broken, why it matters, and what correct behaviour looks like.
        No bullet lists.
      placeholder: "When a user does X, Y happens instead of Z. This causes ..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Named files (`path/to/file.ts:42`), verbatim error messages, stack traces, run URLs,
        PR/issue numbers. "The current behaviour is wrong" is not context.
      placeholder: |
        - `path/to/file.ts:42` — line that throws
        - Error: `TypeError: Cannot read properties of undefined (reading 'id')`
        - https://github.com/.../actions/runs/... — failing run
        - Reproduces on: local / staging / prod
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause
      description: >
        File path, line number, incorrect assumption, and trigger condition that causes the bug.
        What is wrong and why — not just what is affected.
      placeholder: |
        `src/activities/schedule_trigger.ts:58` — the function assumes `workflow` is always
        defined, but it can be `undefined` when the workflow has been deleted between the
        schedule tick and activity execution. The guard added in #N covers the happy path
        only and does not handle the deletion race.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: >
        Grouped checkboxes. Each item independently verifiable. Observable outcomes only.
      placeholder: |
        ### Fix verified
        - [ ] The trigger condition no longer produces the error
        - [ ] Existing behaviour for the happy path is unchanged

        ### Regression coverage
        - [ ] A test exercises the trigger condition and asserts the correct outcome
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Adjacent things that are NOT this ticket.
      placeholder: |
        - Refactoring the surrounding function is not part of this fix
        - Performance improvements to the scheduler are a separate concern
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation Notes
      description: >
        Constraining ADRs, conflicting open PRs, files to avoid, environment caveats.
        Leave blank if none.
      placeholder: |
        - ADR-NNNN constrains the error-handling approach
        - Avoid editing `path/to/shared.ts` — owned by open PR #N
    validations:
      required: false
