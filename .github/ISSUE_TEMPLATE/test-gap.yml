name: Test Gap
description: Report missing or inadequate test coverage for an existing behaviour
title: "test(scope): "
labels: ["test-gap"]
body:
  - type: markdown
    attributes:
      value: |
        Follow the [canonical issue format](../../doc_templates/ISSUE.md) — it explains what each section requires.
        **Title:** replace `scope` with the affected area and complete the imperative phrase.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: >
        One prose paragraph: which behaviour lacks coverage, why that coverage gap matters,
        and what a well-covered version looks like. No bullet lists.
      placeholder: "The rental-order checkout flow is exercised by unit tests but has no E2E coverage ..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Named files, run URLs, PR numbers, and CI evidence that establish the gap.
        "Tests are missing" is not context.
      placeholder: |
        - `frontend/e2e/smoke.spec.ts` — checkout flow not covered (search for `checkout`)
        - PR #N merged the feature but did not add E2E tests
        - https://github.com/.../actions/runs/... — run showing the uncovered path
    validations:
      required: true

  - type: textarea
    id: whats-missing
    attributes:
      label: What's Missing
      description: >
        Which specific behaviours or user journeys lack coverage, which spec file they belong in,
        and why the coverage gap matters. Name the exact test cases. State whether each test
        is gating (smoke/auth — behaviour already works on deployed dev) or non-gating
        (experience.spec.ts — behaviour aspirational or not yet live).
      placeholder: |
        ### Missing coverage
        - `frontend/e2e/smoke.spec.ts` (gating — behaviour works on dev today):
          - [ ] User submits checkout form → order status transitions to `checked-out`
          - [ ] Checkout with missing required field shows inline validation error

        - `temporal/tests/checkout.test.ts` (unit):
          - [ ] `processCheckout` activity returns correct payload when inventory is available
          - [ ] `processCheckout` activity throws `InventoryUnavailableError` when stock is 0
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: >
        Grouped checkboxes. Each item independently verifiable. Observable outcomes only.
      placeholder: |
        ### New tests
        - [ ] All listed missing test cases are implemented
        - [ ] Each new test is in the correct spec file (gating vs non-gating stated in the ticket)
        - [ ] CI passes with the new tests included

        ### No regressions
        - [ ] Existing passing tests remain green
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Adjacent things that are NOT this ticket.
      placeholder: |
        - Implementing missing functionality is not part of this ticket (coverage only)
        - Refactoring test helpers is a separate concern
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation Notes
      description: >
        Constraining ADRs, conflicting open PRs, files to avoid, environment caveats.
        Leave blank if none.
      placeholder: |
        - The checkout feature relies on #N which must merge first
        - Avoid editing `frontend/e2e/auth-access-control.spec.ts` — owned by open PR #N
    validations:
      required: false
