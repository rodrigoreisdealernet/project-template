name: Pipeline - Nightly DevSecOps Docs

# Nightly DevSecOps documentation review per ADR-0025 cadence model.
# Runs at 23:00 UTC (one hour after the developer-docs pipeline) so the two
# doc pipelines do not contend for the GitHub API write quota.
#
# Stage 1: devsecops-docs-manager
#   - On first run (empty docs/devsecops/): BOOTSTRAP MODE — deep review of
#     all security/compliance/ops areas; files up to 5 prioritised tickets.
#   - On subsequent runs: STEADY-STATE MODE — watermark-based sweep over PRs
#     merged since last run; files tickets for coverage gaps (max 2/run).
#
# Security-relevant trigger paths that wake this pipeline:
#   .github/workflows/audit-*.yml, .github/dependabot.yml, terraform/**,
#   charts/*/templates/externalsecrets.yaml, deploy/k8s/rbac*, docs/architecture/network-security.md
#
# The agent reads existing docs/devsecops/ content and open devsecops-docs
# issues before creating any ticket to avoid duplicates.

on:
  schedule:
    - cron: '0 23 * * *'   # nightly at 23:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: pipeline-nightly-devsecops-docs
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .github/tools/shared/package-lock.json

      - name: Install shared runtime
        run: npm ci
        working-directory: .github/tools/shared

      - name: Initialise step summary
        run: |
          {
            echo "## Nightly DevSecOps docs — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 1: DevSecOps Docs Manager ───────────────────────────────────────
      - name: Stage — DevSecOps Docs Manager
        id: devsecops_docs_manager
        continue-on-error: true
        timeout-minutes: 15
        working-directory: .github/tools/shared
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          FACTORY_CONFIG_PATH: ${{ github.workspace }}/.github/factory.yml
          AGENTS_PATH: ${{ github.workspace }}/.github/agents
        run: npx tsx src/run-agent.ts --agent devsecops-docs-manager

      - name: Summarise — DevSecOps Docs Manager
        if: always()
        env:
          OUTCOME: ${{ steps.devsecops_docs_manager.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| devsecops-docs-manager | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
