name: Security - Gitleaks secret scan

# Dedicated secret-scanning gate for every PR and push to main.
# Scans only the commit delta of the PR/push, not the full repository history.
# Findings are redacted in logs by default via the gitleaks-action runtime.
# No GITLEAKS_LICENSE is required for audit mode (MIT licence, public/private repos).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
