name: Pipeline - Daily

# Staged cadence pipeline per ADR-0025.
# Runs once per day at 06:00 UTC for heavier, less time-sensitive sweeps.
#
# Stage order:
#   1. docs-improver       — watches PR feedback / drift and files targeted dev-docs issues
#   2. user-docs-manager   — reviews user-facing PRs since last run, files end-user doc tickets
#   3. trend-analyst       — rolls up cross-ticket root-cause trends into deduplicated auto:trend issues
#   4. contract-drift-detector — detects Supabase RPC/Temporal activity contract drift
#   5. factory-process-reviewer — reviews recent PR process patterns and improves agent instructions
#
# (operations-manager and cluster-guardian moved to the HOURLY pipeline so env/runtime
#  and namespace health surface within the hour, per ADR-0025.)
#
# Stages 1-3 run as independent GitHub Actions steps in a read-only job.
# Stage 5 runs in a dedicated follow-on job so its write-capable token is isolated.
# Each stage keeps continue-on-error: true and a per-stage timeout so a failing/hung
# stage never blocks the next one. Stage outcome is appended to $GITHUB_STEP_SUMMARY.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: read
      actions: read
      security-events: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .github/tools/shared/package-lock.json

      - name: Install shared runtime
        run: npm ci
        working-directory: .github/tools/shared

      - name: Initialise step summary
        run: |
          {
            echo "## Daily pipeline — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 1: Docs Improver ─────────────────────────────────────────────────
      - name: Stage — Docs Improver
        id: docs_improver
        continue-on-error: true
        timeout-minutes: 12
        working-directory: .github/tools/shared
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          FACTORY_CONFIG_PATH: ${{ github.workspace }}/.github/factory.yml
          AGENTS_PATH: ${{ github.workspace }}/.github/agents
        run: npx tsx src/run-agent.ts --agent docs-improver

      - name: Summarise — Docs Improver
        if: always()
        env:
          OUTCOME: ${{ steps.docs_improver.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| docs-improver | $STATUS |" >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 2: User Docs Manager ─────────────────────────────────────────────
      - name: Stage — User Docs Manager
        id: user_docs_manager
        continue-on-error: true
        timeout-minutes: 12
        working-directory: .github/tools/shared
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          FACTORY_CONFIG_PATH: ${{ github.workspace }}/.github/factory.yml
          AGENTS_PATH: ${{ github.workspace }}/.github/agents
        run: npx tsx src/run-agent.ts --agent user-docs-manager

      - name: Summarise — User Docs Manager
        if: always()
        env:
          OUTCOME: ${{ steps.user_docs_manager.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| user-docs-manager | $STATUS |" >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 3: Trend Analyst ────────────────────────────────────────────────
      - name: Stage — Trend Analyst
        id: trend_analyst
        continue-on-error: true
        timeout-minutes: 12
        working-directory: .github/tools/shared
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_MANAGER_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          FACTORY_CONFIG_PATH: ${{ github.workspace }}/.github/factory.yml
          AGENTS_PATH: ${{ github.workspace }}/.github/agents
        run: npx tsx src/run-agent.ts --agent trend-analyst

      - name: Summarise — Trend Analyst
        if: always()
        env:
          OUTCOME: ${{ steps.trend_analyst.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| trend-analyst | $STATUS |" >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 4: Contract Drift Detector ─────────────────────────────────────
      - name: Stage — Contract Drift Detector
        id: contract_drift_detector
        continue-on-error: true
        timeout-minutes: 12
        run: |
          npm ci
          npm run contract-drift
        working-directory: scripts/audit
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}

      - name: Summarise — Contract Drift Detector
        if: always()
        env:
          OUTCOME: ${{ steps.contract_drift_detector.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| contract-drift-detector | $STATUS |" >> "$GITHUB_STEP_SUMMARY"

  factory_process_reviewer:
    needs: pipeline
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: read
      actions: read
      security-events: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: .github/tools/shared/package-lock.json

      - name: Install shared runtime
        run: npm ci
        working-directory: .github/tools/shared

      - name: Initialise step summary
        run: |
          {
            echo "## Factory Process Reviewer — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Stage 5: Factory Process Reviewer ──────────────────────────────────────
      - name: Stage — Factory Process Reviewer
        id: factory_process_reviewer
        continue-on-error: true
        timeout-minutes: 12
        working-directory: .github/tools/shared
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GH_TOKEN: ${{ secrets.PROJECT_MANAGER_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          FACTORY_CONFIG_PATH: ${{ github.workspace }}/.github/factory.yml
          AGENTS_PATH: ${{ github.workspace }}/.github/agents
        run: npx tsx src/run-agent.ts --agent factory-process-reviewer

      - name: Summarise — Factory Process Reviewer
        if: always()
        env:
          OUTCOME: ${{ steps.factory_process_reviewer.outcome }}
        run: |
          STATUS="✅ ok"
          [ "$OUTCOME" != "success" ] && STATUS="⚠️ $OUTCOME"
          echo "| factory-process-reviewer | $STATUS |" >> "$GITHUB_STEP_SUMMARY"

  publish_workflow_health:
    name: Publish workflow-history + health dashboard
    needs: [pipeline, factory_process_reviewer]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Append workflow-history record
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node - <<'NODE' > record.json
          const needs = JSON.parse(process.env.NEEDS_JSON || '{}');
          const summary = Object.entries(needs).map(([job, info]) => `${job}:${info.result}`).join(', ');
          const failed = Object.values(needs).filter((n) => n.result === 'failure').length;
          const skipped = Object.values(needs).filter((n) => n.result === 'skipped').length;
          const cancelled = Object.values(needs).filter((n) => n.result === 'cancelled').length;
          const outcome = failed > 0 ? 'failed' : cancelled > 0 ? 'error' : skipped === Object.keys(needs).length ? 'skipped' : 'passed';
          process.stdout.write(JSON.stringify({
            workflow: 'pipeline-daily',
            category: 'ops',
            outcome,
            summary,
            metrics: { failed_jobs: failed, skipped_jobs: skipped },
          }));
          NODE
          node .github/scripts/workflow-record.mjs "$(cat record.json)"

      - name: Render and publish docs/ci-status
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/health-render-publish.mjs

      - name: Link in job summary
        if: always()
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          {
            echo "## Engineering health dashboard"
            echo "Rendered docs: [\`docs/ci-status/summary.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/ci-status/summary.md)"
          } >> "$GITHUB_STEP_SUMMARY"
