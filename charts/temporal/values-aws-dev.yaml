# AWS EKS dev overrides for the temporal wrapper chart.
# No Istio service mesh on EKS — PeerAuthentication and ringpopPermissive
# must be disabled. PDBs are enabled for resilience. Resources are tuned
# for the t3.medium nodegroup.

# Enable the temporal-config hook for parity with AKS dev. The hook template
# now uses helm.sh/hook-delete-policy: before-hook-creation, so retries do not fail.
configMap:
  hook:
    enabled: true

peerAuthentication:
  ringpopPermissive:
    enabled: false

pdb:
  frontend:
    enabled: true
    minAvailable: 1
  history:
    enabled: true
    minAvailable: 1
  matching:
    enabled: true
    minAvailable: 1
  worker:
    enabled: true
    minAvailable: 1

temporal:
  server:
    config:
      global:
        membership:
          maxJoinDuration: 5m
    frontend:
      initContainers:
        - name: wait-for-history
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              echo "Waiting for temporal-history:6934...";
              until nc -z temporal-history 6934 2>/dev/null;
              do echo "temporal-history not ready, retrying in 5s"; sleep 5; done;
              echo "temporal-history:6934 is ready"
        - name: wait-for-matching
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              echo "Waiting for temporal-matching:6935...";
              until nc -z temporal-matching 6935 2>/dev/null;
              do echo "temporal-matching not ready, retrying in 5s"; sleep 5; done;
              echo "temporal-matching:6935 is ready"
        - name: wait-for-worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              echo "Waiting for temporal-worker:6939...";
              until nc -z temporal-worker 6939 2>/dev/null;
              do echo "temporal-worker not ready, retrying in 5s"; sleep 5; done;
              echo "temporal-worker:6939 is ready"
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
    history:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
    matching:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
    worker:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
  admintools:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 20m
        memory: 64Mi
  web:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 20m
        memory: 64Mi
