{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.frontend.secrets.supabaseAnonKey.secretName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.frontend.secrets.supabaseAnonKey.secretName | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.frontend.secrets.supabaseAnonKey.key | quote }}
      remoteRef:
        {{- /* KV v2 API path: basePath includes /data/ segment (default -> secret/data/project-template/dev/frontend) */}}
        key: {{ printf "%s/%s/frontend" .Values.externalSecrets.basePath .Values.externalSecrets.environment | quote }}
        property: {{ .Values.externalSecrets.frontend.supabaseAnonKeyProperty | quote }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.temporalWorker.secrets.supabaseServiceRoleKey.secretName }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-worker
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.temporalWorker.secrets.supabaseServiceRoleKey.secretName | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.temporalWorker.secrets.supabaseServiceRoleKey.key | quote }}
      remoteRef:
        key: {{ printf "%s/%s/backend" .Values.externalSecrets.basePath .Values.externalSecrets.environment | quote }}
        property: {{ .Values.externalSecrets.backend.supabaseServiceRoleKeyProperty | quote }}
{{- end }}
