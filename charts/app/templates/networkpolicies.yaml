{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.frontend.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace | quote }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-worker-policy
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.temporalWorker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: temporal-worker
  policyTypes:
    - Ingress
    - Egress
  # Intentional: temporal-worker pods are headless workers and do not accept
  # inbound service traffic from other pods in this chart.
  ingress: []
  egress:
    - ports:
        - port: 8000
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 7233
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ops-api-policy
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app.opsApi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ops-api
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - ports:
        - port: 8000
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 7233
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
