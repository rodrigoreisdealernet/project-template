{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: pgbouncer
  selector:
    {{- include "postgres.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "postgres.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: pgbouncer
          image: {{ .Values.pgbouncer.image }}
          ports:
            - containerPort: 5432
              name: pgbouncer
          env:
            - name: DATABASES_HOST
              value: postgres
            - name: DATABASES_PORT
              value: "5432"
            - name: DATABASES_USER
              value: {{ .Values.user | quote }}
            - name: DATABASES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: db-password
            - name: DATABASES_DBNAME
              value: {{ .Values.database | quote }}
            - name: PGBOUNCER_USER
              value: {{ .Values.user | quote }}
            - name: PGBOUNCER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: db-password
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: pgbouncer-config
          projected:
            sources:
              - configMap:
                  name: pgbouncer-config
              - secret:
                  name: postgres-secret
                  items:
                    - key: userlist.txt
                      path: userlist.txt
{{- end }}

