extends: default

# Helm template directories contain Go-template syntax and are already validated
# by the existing helm lint/render PR gate.
ignore: |
  charts/**/templates/**

rules:
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines: disable
  line-length:
    max: 150
    level: warning
  truthy:
    allowed-values: ["true", "false", "on", "off"]
