# Nonprod namespaces for the application.
# Apply with: kubectl apply -f deploy/k8s/namespaces.yaml
#
# These are dedicated namespaces — do NOT reuse the existing other repositories
# `dev`/`test`/`prod` namespaces (see docs/specs/live-cluster-deploy-smoke-rollback.md).
apiVersion: v1
kind: Namespace
metadata:
  name: 10x-stack-dev
  labels:
    app.kubernetes.io/part-of: 10x-stack-template
    app.factory/environment: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: 10x-stack-test
  labels:
    app.kubernetes.io/part-of: 10x-stack-template
    app.factory/environment: test
---
apiVersion: v1
kind: Namespace
metadata:
  name: 10x-stack-supabase
  labels:
    app.kubernetes.io/part-of: 10x-stack-template
    app.factory/environment: shared
